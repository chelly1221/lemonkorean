# ================================================================
# Lemon Korean — VM production compose (single Hetzner VM)
# ================================================================
# Derived from the dev docker-compose.yml (the configuration that
# actually runs in production). Differences:
#   - dev DB UIs (pgadmin / mongo-express / redis-commander) dropped
#   - moderation-service dropped (not deployed; sns runs without it)
#   - no host port publishing — services talk over lemon-network
#   - nginx joins the shared 'web' network as 'lemon-nginx'; the Caddy
#     proxy stack terminates TLS and routes lemon.3chan.kr -> lemon-nginx:80
#   - livekit keeps network_mode: host (RTC needs UDP 50000-50200 / TCP 7881)
#
#   docker compose -f docker-compose.prod.yml up -d --build
# ================================================================

services:
  # ==================== Infrastructure ====================

  postgres:
    image: postgres:15-alpine
    container_name: lemon-postgres
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lemon_korean}
      POSTGRES_USER: ${POSTGRES_USER:-3chan}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/postgres/init:/docker-entrypoint-initdb.d
      - ./config/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - lemon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-3chan}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongo:
    image: mongo:4.4
    container_name: lemon-mongo
    user: "1000:1000"
    command: mongod --config /etc/mongod.conf
    environment:
      MONGO_INITDB_ROOT_USERNAME: 3chan
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
      MONGO_INITDB_DATABASE: ${POSTGRES_DB:-lemon_korean}
    volumes:
      - ./data/mongo-data:/data/db
      - mongo-log:/var/log/mongodb
      - ./database/mongo/init:/docker-entrypoint-initdb.d
      - ./config/mongo/mongod.conf:/etc/mongod.conf:ro
    networks:
      - lemon-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: lemon-redis
    command: redis-server /etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
      - ./config/redis/redis.conf:/etc/redis/redis.conf:ro
    networks:
      - lemon-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: lemon-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - ./data/minio-data:/data
    networks:
      - lemon-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lemon-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: 3chan
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./config/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./config/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - lemon-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ==================== Microservices ====================

  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: lemon-auth-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      DATABASE_URL: postgres://${POSTGRES_USER:-3chan}:${DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-lemon_korean}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    volumes:
      - ./services/auth/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lemon-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  content-service:
    build:
      context: ./services/content
      dockerfile: Dockerfile
    container_name: lemon-content-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3002
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://${POSTGRES_USER:-3chan}:${DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-lemon_korean}
      MONGO_URL: mongodb://3chan:${DB_PASSWORD}@mongo:27017/${POSTGRES_DB:-lemon_korean}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    volumes:
      - ./services/content/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lemon-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  progress-service:
    build:
      context: ./services/progress
      dockerfile: Dockerfile
    container_name: lemon-progress-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3003
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://${POSTGRES_USER:-3chan}:${DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-lemon_korean}?sslmode=disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_URL: amqp://3chan:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - lemon-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  media-service:
    build:
      context: ./services/media
      dockerfile: Dockerfile
    container_name: lemon-media-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3004
      JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: lemon-korean-media
      MINIO_USE_SSL: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lemon-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  analytics-service:
    build:
      context: ./services/analytics
      dockerfile: Dockerfile
    container_name: lemon-analytics-service
    environment:
      ANALYTICS_SERVICE_PORT: 3005
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-lemon_korean}
      DB_USER: ${POSTGRES_USER:-3chan}
      DB_PASSWORD: ${DB_PASSWORD}
      MONGODB_URI: mongodb://3chan:${DB_PASSWORD}@mongo:27017/${POSTGRES_DB:-lemon_korean}?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      LOG_LEVEL: INFO
    volumes:
      - ./services/analytics:/app
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lemon-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3005/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  admin-service:
    build:
      context: ./services/admin
      dockerfile: Dockerfile
    container_name: lemon-admin-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3006
      DATABASE_URL: postgres://${POSTGRES_USER:-3chan}:${DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-lemon_korean}
      MONGO_URL: mongodb://3chan:${DB_PASSWORD}@mongo:27017/${POSTGRES_DB:-lemon_korean}?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: "false"
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAILS: admin@lemon.com
    volumes:
      - ./services/admin/src:/app/src
      - ./services/admin/public:/app/public
      - ./.env:/app/.env
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/project:ro
      - ./data/apk-builds:/apk-builds:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - lemon-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  sns-service:
    build:
      context: ./services/sns
      dockerfile: Dockerfile
    container_name: lemon-sns-service
    extra_hosts:
      - "livekit:host-gateway"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3007
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://${POSTGRES_USER:-3chan}:${DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-lemon_korean}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: lemon-korean-media
      LIVEKIT_HOST: http://livekit:7880
      LIVEKIT_PUBLIC_URL: wss://lemon.3chan.kr/livekit/
      LIVEKIT_API_KEY: lemon-korean-key
      LIVEKIT_SECRET: ${LIVEKIT_SECRET:-lemon-korean-secret-change-me}
    volumes:
      - ./services/sns/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - lemon-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ==================== LiveKit (Voice Chat Rooms) ====================
  # network_mode: host — RTC needs UDP 50000-50200 and TCP 7881 reachable
  # from the public internet (open these on the Hetzner cloud firewall).
  livekit:
    image: livekit/livekit-server:latest
    container_name: lemon-livekit
    network_mode: host
    command:
      - --config
      - /etc/livekit.yaml
      - --keys
      - "lemon-korean-key: ${LIVEKIT_SECRET:-lemon-korean-secret-change-me}"
    volumes:
      - ./config/livekit/livekit.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped

  # ==================== API Gateway ====================
  # Joins the shared 'web' network; Caddy routes lemon.3chan.kr here.
  nginx:
    build: ./nginx
    container_name: lemon-nginx
    extra_hosts:
      - "livekit:host-gateway"
    user: "1000:1000"
    environment:
      NGINX_MODE: ${NGINX_MODE:-development}
    volumes:
      - ./data/nginx-cache:/var/cache/nginx
      - ./data/nginx-logs:/var/log/nginx
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logrotate.conf:/etc/logrotate.d/nginx:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      auth-service:
        condition: service_healthy
      content-service:
        condition: service_healthy
      progress-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
    networks:
      lemon-network: {}
      web:
        aliases:
          - lemon-nginx
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

networks:
  lemon-network:
    driver: bridge
    name: lemon-network
  web:
    external: true

volumes:
  postgres-data:
    name: lemon-postgres-data
  mongo-log:
    name: lemon-mongo-log
  redis-data:
    name: lemon-redis-data
  rabbitmq-data:
    name: lemon-rabbitmq-data
